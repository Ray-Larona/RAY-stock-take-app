<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  font-family: Arial;
  padding:20px;
}

input, button{
  width:100%;
  padding:14px;
  margin:8px 0;
  font-size:18px;
}

button{
  background:#222;
  color:white;
  border:none;
  border-radius:8px;
}

table{
  width:100%;
  margin-top:15px;
  border-collapse:collapse;
}

td, th{
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

.qty{
  width:70px;
  padding:5px;
}

#reader{
  margin-top:10px;
}

</style>

</head>


<body>


<h2>📦 STOCK TAKE</h2>


<input id="user" placeholder="User Name">


<input id="location" placeholder="Location">


<button onclick="scanBarcode()">
📷 SCAN ITEM
</button>


<div id="reader"></div>


<h3>Current Count</h3>


<table>

<thead>

<tr>
<th>Barcode</th>
<th>Qty</th>
</tr>

</thead>

<tbody id="list">

</tbody>

</table>


<br>


<button onclick="uploadLocation()">
UPLOAD LOCATION
</button>


<p id="msg"></p>



<script>


const API_URL = "PASTE_YOUR_SCRIPT_URL_HERE";


let scanner;

let countList = [];



// START CAMERA SCAN

function scanBarcode(){


scanner = new Html5Qrcode("reader");


scanner.start(

{
facingMode:"environment"
},

{
fps:10,
qrbox:250
},


(decodedText)=>{


addBarcode(decodedText);


scanner.stop();


}

);


}



// ADD BARCODE

function addBarcode(code){


let existing = countList.find(
item => item.barcode === code
);


if(existing){

existing.qty++;

}else{

countList.push({

barcode:code,

qty:1

});

}


displayList();


}



// SHOW LIST

function displayList(){


let html="";


countList.forEach((item,index)=>{


html += `

<tr>

<td>${item.barcode}</td>

<td>

<input class="qty"
type="number"
value="${item.qty}"
onchange="updateQty(${index},this.value)"
>

</td>

</tr>

`;


});


document.getElementById("list").innerHTML = html;


}



// CHANGE QTY

function updateQty(index,value){


countList[index].qty = Number(value);


}




// UPLOAD

function uploadLocation(){


let user =
document.getElementById("user").value;


let location =
document.getElementById("location").value;



if(countList.length===0){

alert("No items scanned");

return;

}



let uploads = countList.map(item=>{


return {

user:user,

session:"YEAR END",

location:location,

barcode:item.barcode,

qty:item.qty

};


});



let completed=0;



uploads.forEach(data=>{


fetch(API_URL,{

method:"POST",

body:JSON.stringify(data)

})


.then(r=>r.text())

.then(()=>{


completed++;


if(completed===uploads.length){


document.getElementById("msg").innerHTML=
"✅ Upload Complete";


// CLEAR LOCATION

document.getElementById("location").value="";


// CLEAR LIST

countList=[];

displayList();


}


});


});


}



</script>


</body>

</html>
