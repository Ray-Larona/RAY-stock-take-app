<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stock Take</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1>📦 STOCK TAKE</h1>


<h3 id="user"></h3>


<p>
Session:
<br>
<b id="session">Loading...</b>
</p>


<hr>


<h2>📍 LOCATION</h2>


<input 
type="text" 
id="locationInput"
placeholder="Enter Location">


<div class="location-buttons">


<button onclick="setLocation()">
SET LOCATION
</button>


<button onclick="startLocationScanner()">
📷 SCAN LOCATION
</button>


</div>



<p>
Current Location:
<br>
<b id="currentLocation">---</b>
</p>



<hr>



<div id="cameraBox" style="position:relative; display:none;">

  <button 
    onclick="stopScanner()" 
    style="
      position:absolute;
      right:5px;
      top:5px;
      z-index:999;
      width:35px;
      height:35px;
      border-radius:50%;
      background:#00695c;
      color:white;
      font-size:20px;
      font-weight:bold;
      border:none;">
    X
  </button>

  <div id="reader" style="width:300px;"></div>

</div>


<button id="scanBtn" class="scan-btn" onclick="startScanner()">
▌║│▌║▌│║ START SCAN
</button>

<button id="closeScanBtn" class="logout-btn" onclick="stopScanner()" style="display:none;">
❌ CLOSE CAMERA
</button>


<p>
Barcode:
<b id="barcode">---</b>
</p>



<h2>📋 List</h2>


<div id="itemList"></div>



<h3>
Total:
<span id="total">0</span>
</h3>

<br>

<button id="uploadBtn" onclick="uploadStockTake()">
📤 UPLOAD LOCATION
</button>


  
<div class="logout-area">

<button class="logout-btn" onclick="logout()">
LOGOUT
</button>

</div>



<!-- App Scripts -->

<script src="app.js"></script>

<!-- Barcode Scanner Library -->

<script src="https://unpkg.com/html5-qrcode"></script>


<script src="scanner.js"></script>

<script src="stock.js"></script>

<script src="upload.js"></script>

</body>

</html>
