<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stock Take</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1>
📦 STOCK TAKE
<br>
<small>by: RNTL</small>
</h1>


<h3 id="user"></h3>


<p>
Session:
<br>
<b id="session">Loading...</b>
</p>


<hr>


<h2>📍 LOCATION</h2>


<input 
type="text" 
id="locationInput"
placeholder="Enter Location">


<div class="location-buttons">


<button onclick="setLocation()">
SET LOCATION
</button>


<button onclick="startLocationScanner()">
📷 SCAN LOCATION
</button>


</div>



<p>
Current Location:
<br>
<b id="currentLocation">---</b>
</p>



<hr>



<!-- CAMERA -->

<div id="cameraBox" 
style="position:relative; width:300px; display:none; margin:auto;">


  <div id="reader" style="width:300px;"></div>



  <button
  id="closeCameraBtn"
  onclick="stopScanner()"
  style="
  display:none;
  position:absolute;
  right:5px;
  top:5px;
  z-index:9999;
  border:none;
  background:none;
  color:red;
  font-size:30px;
  font-weight:bold;
  padding:0;
  width:35px;
  height:35px;
  cursor:pointer;">
  X
  </button>


</div>




<button id="scanBtn" class="scan-btn" onclick="startScanner()">
▌║│▌║▌│║ START SCAN
</button>

<div class="manual-input">

<input 
type="text"
id="manualBarcode"
placeholder="Enter barcode">


<button onclick="manualAddBarcode()">
➕ ADD ITEM
</button>

</div>
 
<p>
Barcode:
<b id="barcode">---</b>
</p>
  
<div class="list-title">

  <button class="clear-btn" onclick="clearList()">
    🗑️ Clear
  </button>

  <h2>📋 List</h2>

  <span></span>

</div>


<div id="itemList"></div>



<h3>
Total:
<span id="total">0</span>
</h3>


<br>


<button id="uploadBtn" onclick="uploadStockTake()">
📤 UPLOAD LOCATION
</button>

  

<div class="logout-area">

<button class="logout-btn" onclick="logout()">
LOGOUT
</button>

</div>



<p id="message"></p>



</div>




<!-- SCRIPTS -->

<script src="app.js"></script>

<script src="https://unpkg.com/html5-qrcode"></script>

<script src="scanner.js"></script>

<script src="stock.js"></script>

<script src="upload.js"></script>


</body>

</html>
